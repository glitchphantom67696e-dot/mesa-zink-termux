# .github/workflows/build-mesa-zink.yml

name: Build Mesa 24 Zink for Termux

on:
  workflow_dispatch:
    inputs:
      mesa_version:
        description: 'Mesa version (e.g., 24.3.4)'
        required: true
        default: '24.3.4'
      target_arch:
        description: 'Target architecture'
        required: true
        default: 'aarch64'
        type: choice
        options:
          - aarch64
          - arm
          - i686
          - x86_64

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    
    steps:
      - name: Clone termux-packages
        uses: actions/checkout@v4
        with:
          repository: termux/termux-packages
          path: termux-packages

      - name: Setup build environment
        run: |
          cd termux-packages
          ./scripts/setup-ubuntu.sh
          ./scripts/setup-android-sdk.sh

      - name: Create mesa-zink package directory
        run: |
          mkdir -p termux-packages/packages/mesa-zink

      - name: Create build.sh with patches applied
        run: |
          cat > termux-packages/packages/mesa-zink/build.sh << 'BUILDEOF'
          TERMUX_PKG_HOMEPAGE=https://www.mesa3d.org
          TERMUX_PKG_DESCRIPTION="Mesa Zink (OpenGL over Vulkan) for Termux"
          TERMUX_PKG_LICENSE="MIT"
          TERMUX_PKG_MAINTAINER="@termux-user"
          TERMUX_PKG_VERSION="${{ github.event.inputs.mesa_version }}"
          TERMUX_PKG_SRCURL=https://archive.mesa3d.org/mesa-${TERMUX_PKG_VERSION}.tar.xz
          TERMUX_PKG_SHA256=SKIP_CHECKSUM
          TERMUX_PKG_DEPENDS="libandroid-shmem, libc++, libdrm, libx11, libxcb, libxshmfence, vulkan-loader, zlib, zstd"
          TERMUX_PKG_BUILD_DEPENDS="libwayland-protocols, xorgproto"
          TERMUX_PKG_CONFLICTS="mesa, libmesa"
          TERMUX_PKG_REPLACES="mesa"

          TERMUX_PKG_EXTRA_CONFIGURE_ARGS="
          -Dcpp_rtti=false
          -Dgbm=disabled
          -Dopengl=true
          -Degl=enabled
          -Degl-native-platform=x11
          -Dgles1=disabled
          -Dgles2=enabled
          -Dglx=xlib
          -Dllvm=disabled
          -Dshared-llvm=disabled
          -Dplatforms=x11
          -Dgallium-drivers=virgl,zink,swrast
          -Dvulkan-drivers=
          -Dglvnd=disabled
          -Dxmlconfig=disabled
          -Dgallium-va=disabled
          -Dgallium-vdpau=disabled
          -Dgallium-xa=disabled
          -Dgallium-omx=disabled
          -Dlibunwind=disabled
          -Dvalgrind=disabled
          -Dmicrosoft-clc=disabled
          -Dbuildtype=release
          -Dgallium-tests=disabled
          -Dtools=[]
          -Dperfetto=disabled
          -Ddraw-use-llvm=false
          "

          TERMUX_PKG_EXTRA_MAKE_ARGS="-j$(nproc)"

          termux_step_post_get_source() {
              sed -i 's/import os/import os\nimport shutil\n\ndef link(src, dest):\n    shutil.copyfile(src, dest)\n\ndef unlink(src):\n    os.remove(src)\n\nos.link = link\nos.unlink = unlink\n/' bin/install_megadrivers.py
              
              sed -i 's/#include "eglarray.h"/#include "eglarray.h"\n#include <X11\/Xlib.h>/' src/egl/main/egldisplay.h
              
              if grep -q "memfd_create" src/util/anon_file.c; then
                  sed -i 's/fd = memfd_create/fd = syscall(SYS_memfd_create, debug_name, MFD_CLOEXEC | MFD_ALLOW_SEALING);\n   if (fd >= 0) return fd;\n   fd = memfd_create/' src/util/anon_file.c
              fi
              
              rm -rf subprojects
          }

          termux_step_pre_configure() {
              export LDFLAGS+=" -landroid-shmem -llog"
              export CPPFLAGS+=" -D__USE_GNU"
          }
          BUILDEOF

      - name: Enable ZRAM
        run: |
          sudo modprobe zstd
          echo zstd | sudo tee /sys/block/zram0/comp_algorithm 2>/dev/null || true
          echo 16G | sudo tee /sys/block/zram0/disksize 2>/dev/null || true
          sudo mkswap /dev/zram0 2>/dev/null || true
          sudo swapon /dev/zram0 2>/dev/null || true

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          docker system prune -af 2>/dev/null || true

      - name: Build package
        run: |
          cd termux-packages
          ./scripts/run-docker.sh ./build-package.sh \
            -I \
            -f \
            -a "${{ github.event.inputs.target_arch }}" \
            mesa-zink

      - name: Collect artifacts
        if: always()
        run: |
          mkdir -p artifacts
          find termux-packages/output -name "*.deb" -type f -exec cp {} artifacts/ \; 2>/dev/null || true
          find termux-packages/debs -name "*.deb" -type f -exec cp {} artifacts/ \; 2>/dev/null || true
          cd artifacts && sha256sum *.deb > checksums.txt 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mesa-zink-${{ github.event.inputs.target_arch }}-${{ github.event.inputs.mesa_version }}
          path: artifacts/*
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: mesa-zink-${{ github.event.inputs.mesa_version }}
          name: Mesa Zink ${{ github.event.inputs.mesa_version }} for Termux
          body: |
            ## Mesa Zink ${{ github.event.inputs.mesa_version }} for Termux (${{ github.event.inputs.target_arch }})
            
            ### Installation
            ```bash
            dpkg -i mesa-zink_*.deb
            apt --fix-broken install -y
            ```
            
            ### Usage
            ```bash
            export MESA_NO_ERROR=1
            export MESA_GL_VERSION_OVERRIDE=4.3COMPAT
            export MESA_GLES_VERSION_OVERRIDE=3.2
            export GALLIUM_DRIVER=zink
            export ZINK_DESCRIPTORS=lazy
            glxinfo -B
            ```
          files: artifacts/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
